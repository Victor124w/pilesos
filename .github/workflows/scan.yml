name: m112 hourly scan

# Парсинг каталога m112.com.ua → диффы (продажи/приходы) в D1 + пред-сборка остатков.
# Расписание НЕ здесь: планировщик GitHub ненадёжен (тихо роняет плановые запуски).
# Триггерит Cloudflare-воркер по своему cron (:30, окно 08:30–20:30 Киев) через workflow_dispatch.
on:
  workflow_dispatch:           # запуск воркером по расписанию, кнопкой в боте или вручную из Actions
    inputs:
      manual:                  # 'true' только для кнопки «▶️ Запустить сейчас» → слать уведомление о завершении
        description: 'Ручной запуск (прислать уведомление о завершении)'
        required: false
        default: 'false'

concurrency:
  group: m112-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Scan catalog → D1
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node run.mjs
      - name: Build stock xlsx → Telegram file_id → D1
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: node build-stock.mjs
      - name: Snapshots (утро/вечер реальные + пред-сборка разницы)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: node snapshots.mjs
      - name: Daily summary (шлётся только после последнего скана дня, Киев 20ч)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: node daily-summary.mjs
      - name: Notify admin (только для ручного запуска кнопкой)
        if: github.event.inputs.manual == 'true'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: node notify-done.mjs
