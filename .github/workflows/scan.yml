name: m112 hourly scan

# Часовой парсинг каталога m112.com.ua → диффы (продажи/приходы) в D1 + пред-сборка остатков.
on:
  schedule:
    # 05:05–17:05 UTC = 08:05–20:05 по Киеву (лето, UTC+3). Дневное окно, каждый час.
    - cron: '5 5-17 * * *'
  workflow_dispatch: {}        # ручной запуск (из Actions или кнопкой «Запустить сейчас» в боте)

concurrency:
  group: m112-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Scan catalog → D1
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node run.mjs
      - name: Build stock xlsx → Telegram file_id → D1
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: node build-stock.mjs
      - name: Notify admin (только для ручного запуска)
        if: github.event_name == 'workflow_dispatch'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: node notify-done.mjs
