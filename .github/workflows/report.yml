name: m112 full report

# Полный отчёт «Вывести все» за период (32k строк тяжело для free-воркера).
# Триггерится ботом (кнопка «Вывести все») через workflow_dispatch с параметрами периода.
on:
  workflow_dispatch:
    inputs:
      from:  { description: 'unix ts начала', required: true }
      to:    { description: 'unix ts конца',  required: true }
      label: { description: 'подпись периода', required: true }
      chat:  { description: 'chat_id получателя', required: true }

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Build full report → Telegram
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          FROM: ${{ github.event.inputs.from }}
          TO: ${{ github.event.inputs.to }}
          LABEL: ${{ github.event.inputs.label }}
          CHAT: ${{ github.event.inputs.chat }}
        run: node build-report.mjs
